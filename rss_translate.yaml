# ai-flow demo: RSS → filter AI articles → translate → CSV
# Uses the http + filter nodes added as plugins

pipeline:
  - name: 获取RSS
    type: rss
    url: https://hnrss.org/frontpage

  - name: 只保留AI相关
    type: filter
    field: title
    contains: AI

  # Alternative filter examples (comment in/out):
  #   regex: "(?i)(ai|llm|gpt|openai|deepseek|claude)"
  #   min_length: 20
  #   starts_with: "Show HN"

  - name: AI翻译
    type: llm
    retry: 4
    model: deepseek-chat
    api_key: "env:DEEPSEEK_KEY"
    prompt: |
      将以下Hacker News标题翻译成中文，直接输出：
      标题：{{title}}
      内容：{{description}}
    temperature: 0.3

  - name: 提取字段
    type: mapper
    mapping:
      原标题: "{{title}}"
      链接: "{{link}}"
      翻译: "{{_output}}"

  - name: 保存CSV
    type: csv
    file: "{{env.HOME}}/ai_news.csv"
    columns:
      原标题: "{{原标题}}"
      链接: "{{链接}}"
      AI翻译结果: "{{翻译}}"
